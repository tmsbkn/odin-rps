<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Rock Paper Scissors!</title>
      <link href="styles.css" rel="stylesheet" />
   </head>
   <body>
      <div class="site-wrapper">
         <header>
            <h1>Rock Paper Scissors Dynamite</h1>
            <h2>Choose your weapon wisely</h2>
            <p>
               If you don't know the rules this will be tough. Don't pick the same
               answer too much because I'll catch on!
            </p>
         </header>
         <div id="game-area">
            <div id="player-side">
               <div class="button" id="rockBtn">Rock</div>
               <div class="button" id="paperBtn">Paper</div>
               <div class="button" id="scissorsBtn">Scissors</div>
               <div class="button" id="dynamiteBtn">Dynamite</div>
            </div>
            <div id="computer-side">
               <h2 id="outcome-msg"></h2>
            </div>
         </div>
         <footer>Made by <a href="https://tmsbkn.ca">Tomas Buchan</a></footer>
      </div>
      <script src="script.js"></script>
   </body>
</html>

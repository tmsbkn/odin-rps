<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Rock Paper Scissors!</title>
      <link href="styles.css" rel="stylesheet" />
   </head>
   <body>
      <div class="site-wrapper">
         <header>
            <h1>This is Rock Paper Scissors</h1>
            <h2>Now in a UI!</h2>
         </header>
         <div id="game-area">
            <div id="player-side">
               <div class="button" id="rockBtn">Rock</div>
               <div class="button" id="paperBtn">Paper</div>
               <div class="button" id="scissorsBtn">Scissors</div>
               <div class="button" id="dynamiteBtn">Dynamite</div>
            </div>
            <div id="computer-side">
               <h4>Snark Message</h4>
               <p>Your Score</p>
               <span>You picked</span>
               <span>Computer Picked</span>
            </div>
         </div>
         <footer>Made by <a href="https://tmsbkn.ca">Tomas Buchan</a></footer>
      </div>
      <script src="script.js"></script>
   </body>
</html>
